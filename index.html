<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Avtobys QR</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Roboto, sans-serif;
background:#f2f2f2;
overflow:hidden;
}

/* ⚙️ */
.settings{
position:fixed;
top:12px;
right:12px;
z-index:20;
width:42px;
height:42px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 2px 6px rgba(0,0,0,.25);
cursor:pointer;
}

/* TOP */
.top{
padding-top:34px;
text-align:center;
}

.top-title{
font-size:17px;
color:#222;
margin-bottom:22px;
}

.check{
margin:0 auto 22px;
width:72px;
height:72px;
background:#1f8f3e;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.check svg{
width:34px;
height:34px;
stroke:white;
stroke-width:3;
fill:none;
}

.success{
font-size:26px;
font-weight:500;
margin-bottom:14px;
}

.price{
font-size:46px;
font-weight:500;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.18);
display:flex;
align-items:flex-end;
z-index:5;
}

/* CARD */
.card{
width:100%;
background:#fff;
border-radius:28px 28px 0 0;
padding:26px 22px 30px;
text-align:center;
}

.card-title{
text-align:left;
font-size:18px;
margin-bottom:26px;
}

#qrcode{
width:220px;
margin:0 auto 22px;
}

.gray{
color:#9a9a9a;
font-size:14px;
margin-bottom:26px;
}

.bus{
font-size:20px;
font-weight:500;
margin-bottom:14px;
}

.date{
font-size:15px;
color:#555;
margin-bottom:30px;
}

.bottom{
display:flex;
justify-content:space-around;
font-size:13px;
color:#777;
}

.bottom-item{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

/* SETTINGS PANEL */
.panel{
position:fixed;
inset:0;
background:#fff;
z-index:30;
padding:20px;
display:none;
}

.panel h2{margin-top:0}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:14px;
font-size:17px;
background:#1f8f3e;
color:#fff;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="settings" id="settingsBtn" onclick="openSettings()">⚙️</div>

<div class="top">
<div class="top-title">Avtobys. Оплата проезда по QR</div>

<div class="check">
<svg viewBox="0 0 24 24">
<path d="M4 13l5 5L20 6"/>
</svg>
</div>

<div class="success">Ваш платеж принят.</div>
<div class="price">80 ₸</div>
</div>

<div class="overlay">
<div class="card">

<div class="card-title">Avtobys. Оплата проезда по QR</div>

<div id="qrcode"></div>

<div class="gray">Покажите QR-код контролеру</div>

<div class="bus" id="bus">704BD04</div>
<div class="date" id="date">01 марта 2026 17:22</div>

<div class="bottom">
<div class="bottom-item">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2">
<path d="M6 2h9l3 3v17H6z"/>
<path d="M9 9h6M9 13h6"/>
</svg>
<div>Квитанция</div>
</div>

<div class="bottom-item">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2">
<circle cx="18" cy="5" r="3"/>
<circle cx="6" cy="12" r="3"/>
<circle cx="18" cy="19" r="3"/>
<path d="M8.5 13.5L15.5 17.5M15.5 6.5L8.5 10.5"/>
</svg>
<div>Поделиться</div>
</div>
</div>

</div>
</div>

<div class="panel" id="panel">
<h2>Настройки</h2>

<input id="busInput" value="704BD04">
<input type="date" id="dateInput">
<input type="time" id="timeInput">

<button onclick="apply()">Применить</button>
<button onclick="goFullscreen()">Полноэкранный режим</button>
</div>

<script>
function openSettings(){
panel.style.display='block';
}

function apply(){
bus.textContent=busInput.value;

if(dateInput.value && timeInput.value){
let d=new Date(dateInput.value+"T"+timeInput.value);
let m=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
date.textContent=d.getDate()+" "+m[d.getMonth()]+" "+d.getFullYear()+" "+timeInput.value;
}

makeQR(busInput.value+dateInput.value+timeInput.value);
panel.style.display='none';
}

function makeQR(t){
qrcode.innerHTML="";
QRCode.toCanvas(t,{width:220},(_,c)=>qrcode.appendChild(c));
}

function goFullscreen(){
document.documentElement.requestFullscreen();
document.getElementById("settingsBtn").style.display="none";
panel.style.display='none';
}

document.addEventListener("fullscreenchange",()=>{
if(!document.fullscreenElement){
document.getElementById("settingsBtn").style.display="flex";
}
});

makeQR("704BD04");
</script>

</body>
</html>
