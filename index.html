<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Avtobys QR</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Roboto, sans-serif;
background:#f2f2f2;
overflow:hidden;
}

/* ⚙️ */
.settings{
position:fixed;
top:12px;
right:12px;
z-index:20;
width:42px;
height:42px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 2px 6px rgba(0,0,0,.25);
cursor:pointer;
}

/* TOP */
.top{
padding-top:32px;
text-align:center;
}

.top-title{
font-size:17px;
color:#222;
}

.check{
margin:18px auto 0;
width:72px;
height:72px;
background:#1f8f3e;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.check svg{
width:34px;
height:34px;
stroke:white;
stroke-width:3;
fill:none;
}

.success{
margin-top:18px;
font-size:26px;
font-weight:500;
}

.price{
margin-top:8px;
font-size:46px;
font-weight:500;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.18);
display:flex;
align-items:flex-end;
z-index:5;
}

/* CARD */
.card{
width:100%;
background:#fff;
border-radius:28px 28px 0 0;
padding:24px 22px 28px;
text-align:center;
}

.card-title{
text-align:left;
font-size:18px;
margin-bottom:18px;
}

#qrcode{
width:220px;
margin:0 auto 14px;
}

.gray{
color:#9a9a9a;
font-size:14px;
}

.bus{
margin-top:16px;
font-size:20px;
font-weight:500;
}

.date{
margin-top:8px;
font-size:15px;
color:#555;
}

.bottom{
margin-top:26px;
display:flex;
justify-content:space-around;
font-size:14px;
color:#777;
}

/* SETTINGS PANEL */
.panel{
position:fixed;
inset:0;
background:#fff;
z-index:30;
padding:20px;
display:none;
}

.panel h2{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:14px;
font-size:17px;
background:#1f8f3e;
color:#fff;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="settings" onclick="openSettings()">⚙️</div>

<div class="top">
<div class="top-title">Avtobys. Оплата проезда по QR</div>

<div class="check">
<svg viewBox="0 0 24 24">
<path d="M4 13l5 5L20 6"/>
</svg>
</div>

<div class="success">Ваш платеж принят.</div>
<div class="price">80 ₸</div>
</div>

<div class="overlay">
<div class="card">

<div class="card-title">Avtobys. Оплата проезда по QR</div>

<div id="qrcode"></div>

<div class="gray">Покажите QR-код контролеру</div>

<div class="bus" id="bus">704BD04</div>
<div class="date" id="date">01 марта 2026 17:22</div>

<div class="bottom">
<div>🧾<br>Квитанция</div>
<div>🔗<br>Поделиться</div>
</div>

</div>
</div>

<div class="panel" id="panel">
<h2>Настройки</h2>

<input id="busInput" placeholder="Код автобуса" value="704BD04">
<input type="date" id="dateInput">
<input type="time" id="timeInput">

<button onclick="apply()">Применить</button>
<button onclick="goFullscreen()">Полноэкранный режим</button>
</div>

<script>
function openSettings(){
document.getElementById('panel').style.display='block';
}

function apply(){
let bus=busInput.value;
let d=dateInput.value;
let t=timeInput.value;

bus && (document.getElementById('bus').innerText=bus);

if(d && t){
let dt=new Date(d+"T"+t);
let m=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
document.getElementById('date').innerText=
dt.getDate()+" "+m[dt.getMonth()]+" "+dt.getFullYear()+" "+t;
}

makeQR(bus+d+t);
panel.style.display='none';
}

function makeQR(text){
qrcode.innerHTML="";
QRCode.toCanvas(text,{width:220},(_,c)=>qrcode.appendChild(c));
}

function goFullscreen(){
document.documentElement.requestFullscreen();
panel.style.display='none';
}

makeQR("704BD04");
</script>

</body>
</html>
