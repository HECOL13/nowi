<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avtobys</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#f2f2f2;
}

/* задний экран */
.background{
position:fixed;
top:0;left:0;right:0;bottom:0;
display:flex;
justify-content:center;
background:#f5f5f5;
}
.background::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.25);
}

/* контент сзади */
.bg-content{
position:relative;
z-index:1;
text-align:center;
margin-top:60px;
}
.check{
width:70px;height:70px;
background:#18a957;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:34px;
margin:auto;
}
.success{
font-size:24px;
margin-top:18px;
}
.price{
font-size:42px;
margin-top:10px;
}

/* карточка */
.card{
position:fixed;
bottom:0;left:0;right:0;
background:#fff;
border-radius:28px 28px 0 0;
padding:24px;
text-align:center;
box-shadow:0 -10px 30px rgba(0,0,0,.35);
}
.title{
font-size:18px;
text-align:left;
margin-bottom:10px;
}
.close{
float:right;
font-size:22px;
}
canvas{
width:220px;height:220px;
margin:16px auto;
}
.hint{
color:#9a9a9a;
}
.code{
font-size:20px;
letter-spacing:2px;
margin-top:12px;
}
.date{
color:#555;
margin-top:6px;
}
.bottom{
display:flex;
justify-content:space-around;
margin-top:22px;
color:#555;
font-size:14px;
}

/* панель редактирования */
.panel{
position:fixed;
top:10px;left:10px;right:10px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
}
.panel input{
width:100%;
padding:8px;
margin-top:6px;
font-size:14px;
}

/* кнопка фуллскрина */
.full{
position:fixed;
top:12px;right:12px;
padding:8px 12px;
border:none;
border-radius:8px;
background:#fff;
font-size:16px;
}
.hide{
display:none;
}
</style>
</head>

<body>

<button class="full" onclick="goFull()">⛶</button>

<div class="panel" id="panel">
Код автобуса
<input oninput="setCode(this.value)" placeholder="704BD04">
Дата и время
<input oninput="setDate(this.value)" placeholder="01 марта 2026 17:22">
</div>

<div class="background">
<div class="bg-content">
<div>Avtobys. Оплата проезда по QR</div>
<div class="check">✓</div>
<div class="success">Ваш платеж принят.</div>
<div class="price">80 ₸</div>
</div>
</div>

<div class="card">
<div class="title">
Avtobys. Оплата проезда по QR
<span class="close">✕</span>
</div>

<canvas id="qr"></canvas>

<div class="hint">Покажите QR‑код контролеру</div>
<div class="code" id="bus">704BD04</div>
<div class="date" id="date">01 марта 2026 17:22</div>

<div class="bottom">
<div>🧾<br>Квитанция</div>
<div>🔗<br>Поделиться</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
<script>
let qr=new QRious({
element:document.getElementById("qr"),
value:"704BD04",
size:220,
level:"H"
});

function setCode(v){
document.getElementById("bus").innerText=v;
qr.set({value:v});
}
function setDate(v){
document.getElementById("date").innerText=v;
}
function goFull(){
document.getElementById("panel").classList.add("hide");
document.querySelector(".full").classList.add("hide");
document.documentElement.requestFullscreen();
}
</script>

</body>
</html>
