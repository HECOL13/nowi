<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avtobys</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#eee;
color:#000;
}

/* фон приложения */
.app{
position:fixed;
inset:0;
background:#f4f4f4;
}

/* затемнение */
.app::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
}

/* верхний контент */
.top{
position:relative;
z-index:1;
text-align:center;
padding-top:40px;
}
.top-title{
font-size:15px;
color:#333;
}
.check{
margin:18px auto 14px;
width:64px;
height:64px;
border-radius:50%;
background:#1aa34a;
display:flex;
align-items:center;
justify-content:center;
}
.check svg{
width:34px;
height:24px;
fill:none;
stroke:#fff;
stroke-width:4;
stroke-linecap:round;
stroke-linejoin:round;
}
.success{
font-size:22px;
font-weight:500;
margin-bottom:6px;
}
.price{
font-size:42px;
font-weight:500;
}

/* карточка */
.card{
position:fixed;
left:0;right:0;bottom:0;
background:#fff;
border-radius:26px 26px 0 0;
padding:22px 20px 28px;
box-shadow:0 -8px 25px rgba(0,0,0,.35);
}
.card-header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:17px;
margin-bottom:14px;
}
.card-header span{
font-size:22px;
color:#555;
}
canvas{
display:block;
margin:0 auto 14px;
width:220px;
height:220px;
}
.hint{
text-align:center;
color:#9a9a9a;
font-size:14px;
}
.code{
text-align:center;
margin-top:14px;
font-size:18px;
letter-spacing:2px;
}
.date{
text-align:center;
margin-top:6px;
font-size:14px;
color:#555;
}
.bottom{
display:flex;
justify-content:space-around;
margin-top:26px;
font-size:14px;
color:#555;
}

/* панель управления */
.controls{
position:fixed;
top:10px;
left:10px;
right:10px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.25);
z-index:10;
}
.controls label{
font-size:13px;
color:#555;
}
.controls input{
width:100%;
padding:8px;
margin:4px 0 8px;
font-size:14px;
}
.controls button{
width:100%;
padding:10px;
font-size:15px;
border:none;
border-radius:8px;
background:#000;
color:#fff;
}

/* скрытие */
.hide{display:none}
</style>
</head>

<body>

<div class="controls" id="controls">
<label>Код автобуса</label>
<input placeholder="704BD04" oninput="setCode(this.value)">
<label>Дата и время</label>
<input placeholder="01 марта 2026 17:22" oninput="setDate(this.value)">
<button onclick="goFull()">Полноэкранный режим</button>
</div>

<div class="app">

<div class="top">
<div class="top-title">Avtobys. Оплата проезда по QR</div>

<div class="check">
<svg viewBox="0 0 24 16">
<polyline points="2,9 9,14 22,2"></polyline>
</svg>
</div>

<div class="success">Ваш платеж принят.</div>
<div class="price">80 ₸</div>
</div>

</div>

<div class="card">
<div class="card-header">
<div>Avtobys. Оплата проезда по QR</div>
<span>×</span>
</div>

<canvas id="qr"></canvas>

<div class="hint">Покажите QR-код контролеру</div>
<div class="code" id="bus">704BD04</div>
<div class="date" id="date">01 марта 2026 17:22</div>

<div class="bottom">
<div>🧾<br>Квитанция</div>
<div>🔗<br>Поделиться</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
<script>
let qr=new QRious({
element:document.getElementById("qr"),
value:"704BD04",
size:220,
level:"H"
});

function setCode(v){
document.getElementById("bus").innerText=v;
qr.set({value:v});
}
function setDate(v){
document.getElementById("date").innerText=v;
}
function goFull(){
document.getElementById("controls").classList.add("hide");
document.documentElement.requestFullscreen();
}
</script>

</body>
</html>
