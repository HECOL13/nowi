<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avtobys QR</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Roboto, sans-serif;
background:#f3f3f3;
overflow:hidden;
}

.top{
text-align:center;
padding-top:40px;
}

.title{
font-size:18px;
color:#222;
margin-bottom:20px;
}

.check{
width:70px;
height:70px;
background:#1a8f3e;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.check svg{
width:36px;
fill:white;
}

.success{
font-size:26px;
margin-top:20px;
font-weight:500;
}

.price{
font-size:46px;
margin-top:10px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
display:flex;
align-items:flex-end;
}

.card{
width:100%;
background:white;
border-radius:30px 30px 0 0;
padding:25px;
box-sizing:border-box;
text-align:center;
}

.cardtitle{
font-size:20px;
margin-bottom:20px;
text-align:left;
}

#qrcode{
margin:20px auto;
width:220px;
}

.gray{
color:#999;
margin-top:10px;
}

.bus{
font-size:20px;
margin-top:15px;
}

.date{
color:#555;
margin-top:10px;
}

.bottom{
display:flex;
justify-content:space-around;
margin-top:25px;
color:#777;
font-size:14px;
}

.settings{
position:fixed;
top:10px;
right:10px;
font-size:22px;
background:white;
border-radius:50%;
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
cursor:pointer;
}

.panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:10;
padding:20px;
display:none;
}

input{
width:100%;
padding:10px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#1a8f3e;
border:none;
color:white;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="settings" onclick="openSettings()">⚙️</div>

<div class="top">
<div class="title">Avtobys. Оплата проезда по QR</div>

<div class="check">
<svg viewBox="0 0 24 24">
<path d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20.3 7.7l-1.4-1.4z"/>
</svg>
</div>

<div class="success">Ваш платеж принят.</div>
<div class="price">80 ₸</div>
</div>

<div class="overlay">

<div class="card">

<div class="cardtitle">Avtobys. Оплата проезда по QR</div>

<div id="qrcode"></div>

<div class="gray">Покажите QR-код контролеру</div>

<div class="bus" id="bus">704BD04</div>
<div class="date" id="date">01 марта 2026 17:22</div>

<div class="bottom">
<div>🧾<br>Квитанция</div>
<div>🔗<br>Поделиться</div>
</div>

</div>

</div>

<div class="panel" id="panel">

<h2>Настройки</h2>

<label>Код автобуса</label>
<input id="busInput" value="704BD04">

<label>Дата</label>
<input type="date" id="dateInput">

<label>Время</label>
<input type="time" id="timeInput">

<button onclick="apply()">Применить</button>
<button onclick="fullscreen()">Полноэкранный режим</button>

</div>

<script>

function makeQR(text){
document.getElementById("qrcode").innerHTML=""
QRCode.toCanvas(text,{width:220},function(err,canvas){
document.getElementById("qrcode").appendChild(canvas)
})
}

makeQR("bus-ticket")

function openSettings(){
document.getElementById("panel").style.display="block"
}

function apply(){

let bus=document.getElementById("busInput").value
let date=document.getElementById("dateInput").value
let time=document.getElementById("timeInput").value

document.getElementById("bus").innerText=bus

if(date && time){

let d=new Date(date+"T"+time)

let months=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"]

let text=d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear()+" "+time

document.getElementById("date").innerText=text

}

makeQR(bus+date+time)

document.getElementById("panel").style.display="none"

}

function fullscreen(){

document.documentElement.requestFullscreen()

document.getElementById("panel").style.display="none"

}

</script>

</body>
</html>
